<!DOCTYPE html>
<html>
<head>
  <title>3 Column Layout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="column">
    <div class="row header">Name</div>
    <div class="row">Aathavan</div>
    <div class="row">Nilesh</div>
    <div class="row last">Kalaivani</div>
  </div>

  <div class="column">
    <div class="row header">Age</div>
    <div class="row">21</div>
    <div class="row">21</div>
    <div class="row last">43</div>
  </div>

  <div class="column">
    <div class="row header">Designation</div>
    <div class="row">Student</div>
    <div class="row">Student</div>
    <div class="row last">Teacher</div>
  </div>
</div>

</body>
</html>
